services:
  app:
    image: ${IMAGE_NAME}
    hostname: ${PROJECT_NAME}.docker.cpdi
    container_name: ${PROJECT_NAME}
    environment:
      TZ: Africa/Luanda
    networks:
      - cpdi-bridge
    restart: always
    healthcheck:
      test: wget --quiet --spider http://127.0.0.1:80 || exit 1
      interval: 60s
      timeout: 3s
      retries: 5
      start_period: 5s

networks:
  cpdi-bridge:
    external: true
